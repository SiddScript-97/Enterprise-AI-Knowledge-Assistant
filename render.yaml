# render.yaml
services:
  # FastAPI Backend
  - type: web
    name: ai-knowledge-assistant-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: VECTOR_STORE_PATH
        value: /tmp/vectorstore
      - key: DEBUG
        value: false

  # Streamlit Frontend
  - type: web
    name: ai-knowledge-assistant-ui
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.headless true
    envVars:
      - key: BACKEND_URL
        fromService:
          name: ai-knowledge-assistant-api
          type: web
          property: host
